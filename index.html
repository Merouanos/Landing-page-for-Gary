<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Performance Landing Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Minimalist "Apple-style" font stack */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    </style>
</head>
<body class="bg-white text-gray-900 antialiased">

    <section class="max-w-4xl mx-auto px-6 py-20 text-center">
        <h1 class="text-5xl font-extrabold tracking-tight mb-6">Build Your Dream Space</h1>
        <p class="text-xl text-gray-600 mb-10">High-quality construction with a minimalist touch. Fast, reliable, and conversion-focused.</p>
        
        <div class="bg-gray-50 p-8 rounded-2xl border border-gray-100 shadow-sm max-w-md mx-auto">
            <form name="quote-request" method="POST" netlify  class="space-y-4">
                <input type="text" name="name" placeholder="Full Name" required class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none">
                <input type="email" name="email" placeholder="Email Address" required class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none">
                <textarea name="message" placeholder="Describe your project" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                <button type="submit" class="w-full bg-black text-white font-bold py-4 rounded-lg hover:bg-gray-800 transition">Get a Free Quote</button>
            </form>
        </div>
    </section>

    </body>
</html>
