
[[headers]]
  for = "/*"
  [headers.values]
    Link = "</fonts/Inter.woff2>; rel=preload; as=font; crossorigin, </output.css>; rel=preload; as=style"


[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"


[images]
remote_images = ["https://bath-remodel.netlify.app/.*"]